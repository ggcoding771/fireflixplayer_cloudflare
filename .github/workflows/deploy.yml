name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build with OpenNext for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY || '7967738a03ec215c7d6d675faba9c973' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: db18b7bbe7cad3a8e87df146c0516b7d
          command: pages deploy .open-next/worker --project-name=fireflixplayer
