name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build --skipWranglerConfigCheck

      - name: Prepare Pages deployment
        run: |
          cp .open-next/worker.js .open-next/assets/_worker.js
          cp -r .open-next/cloudflare .open-next/assets/cloudflare
          cp -r .open-next/middleware .open-next/assets/middleware
          cp -r .open-next/server-functions .open-next/assets/server-functions
          cp -r .open-next/.build .open-next/assets/.build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next/assets --project-name=fireflixplayer --commit-dirty=true
